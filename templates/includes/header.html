<header class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'mailing:list' %}">Mailing Service</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mailing:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mailing:list' %}">Mailings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mailing:recipient_list' %}">Recipients</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mailing:message_list' %}">Messages</a>
                </li>
                {% if user.is_manager or user.is_staff %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mailing:user_list' %}">Users</a>
                </li>
                {% endif %}
            </ul>
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link text-white">{{ user.email }}</span>
                </li>
                <li class="nav-item">
                    <form method="post" action="{% url 'users:logout' %}" class="form-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link">Logout</button>
                    </form>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:login' %}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:register' %}">Register</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</header>
