{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="header-actions">
        <h2>My Recipients</h2>
        <a href="{% url 'mailing:recipient_create' %}" class="btn btn-primary">Add Recipient</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for object in object_list %}
            <tr>
                <td>{{ object.full_name }}</td>
                <td>{{ object.email }}</td>
                <td>
                    <a href="{% url 'mailing:recipient_edit' object.pk %}" class="btn btn-sm">Edit</a>
                    <a href="{% url 'mailing:recipient_delete' object.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No recipients found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
