{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="header-actions">
        <h2>My Messages</h2>
        <a href="{% url 'mailing:message_create' %}" class="btn btn-primary">Create Message</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for object in object_list %}
            <tr>
                <td>{{ object.subject }}</td>
                <td>
                    <a href="{% url 'mailing:message_edit' object.pk %}" class="btn btn-sm">Edit</a>
                    <a href="{% url 'mailing:message_delete' object.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No messages found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
